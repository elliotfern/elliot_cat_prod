name: Deploy Elliot.cat legacy (full sync + build + composer)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: elliot_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot" --health-interval=10s --health-timeout=5s --health-retries=10


    env:
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASS: root
      DB_DBNAME: elliot_test
      APP_ENV: test
      TEST_BASE_URL: http://127.0.0.1:8000

    steps:
      # 1) Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2) PHP Setup
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql
          coverage: none
          cache: composer

      # 3) Install PHP dependencies
      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      # 4) Wait for MySQL
      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -proot && break
            echo "Waiting for MySQL..."
            sleep 2
          done

      # 5) Init DB schema
      - name: Init database schema
        run: |
          mysql -h 127.0.0.1 -uroot -proot elliot_test < database/test/schema.sql

      # 6) Seed database
      - name: Seed database
        run: |
          mysql -h 127.0.0.1 -uroot -proot elliot_test < database/test/seed.sql

      - name: Start server
        run: |
          php -S 127.0.0.1:8000 -t public > server.log 2>&1 &

          for i in {1..10}; do
            curl -s http://127.0.0.1:8000 && break
            echo "waiting server..."
            sleep 1
          done

          curl -I http://127.0.0.1:8000 || (cat server.log && exit 1)

      # Start PHP built-in server

      # 7) Run PHPUnit tests
      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --exclude-group http --colors=always

      # 8) PHP Syntax Check
      - name: PHP Syntax Check
        run: find src -name "*.php" -print0 | xargs -0 -n1 php -l

      # 9) Node setup
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies (npm)
        run: npm ci

      - name: Build frontend assets
        env:
          CI: true
          API_BASE: https://elliot.cat/api
          DOMAIN_WEB: https://elliot.cat
          DOMAIN_IMG: https://media.elliot.cat
          INTRANET_WEB: https://elliot.cat/gestio
        run: npm run build

      # 10) Write version file
      - name: Write APP_VERSION file
        run: |
          echo "${GITHUB_SHA}" > public/version.txt

      # 11) SSH setup
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 87.98.230.129 >> ~/.ssh/known_hosts

      # 12) Rsync deploy
      - name: Sync project to shared hosting (rsync)
        run: |
          set -euo pipefail

          REMOTE="epgylzqu@87.98.230.129"
          REMOTE_DIR="/home/epgylzqu/elliot.cat/"

          rsync -az --delete \
            --chmod=Du=rwx,Dgo=rx,Fu=rw,Fgo=r \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "node_modules/" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "var/" \
            --exclude "*.log" \
            -e "ssh" \
            ./ "$REMOTE:$REMOTE_DIR"

      # 13) Verify deploy
      - name: Verify version on server
        run: |
          ssh epgylzqu@87.98.230.129 "bash -lc '
            echo \"---- version.txt ----\"
            cat /home/epgylzqu/elliot.cat/public/version.txt || true

            echo \"---- dist folder ----\"
            ls -lh /home/epgylzqu/elliot.cat/public/dist/ || true
          '"
