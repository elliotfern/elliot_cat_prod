name: Deploy Elliot.cat legacy (full sync + build + composer)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2) PHP Setup
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_mysql
          coverage: none
          cache: composer

      # 3) Install PHP dependencies (CI BUILD)
      - name: Install PHP dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      # 4) PHP Syntax Check
      - name: PHP Syntax Check
        run: find src -name "*.php" -print0 | xargs -0 -n1 php -l

      # 5) Run tests
      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --colors=always

      # 6) Node setup
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies (npm)
        run: npm ci

      # 7) Build frontend
      - name: Build frontend assets
        run: npm run build

      # 8) Write version file
      - name: Write APP_VERSION file
        run: |
          echo "${GITHUB_SHA}" > public/version.txt
          echo "APP_VERSION=${GITHUB_SHA}"
          cat public/version.txt

      # 9) Show footer debug (optional)
      - name: Show footer bundle line
        run: |
          grep -n "bundle.js?v=" public/includes/footer-end.php || true

      # 10) SSH setup
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 87.98.230.129 >> ~/.ssh/known_hosts

      # 11) Rsync deploy
      - name: Sync project to shared hosting (rsync)
        run: |
          set -euo pipefail

          REMOTE="epgylzqu@87.98.230.129"
          REMOTE_DIR="/home/epgylzqu/elliot.cat/"

          rsync -az --delete-excluded \
            --chmod=Du=rwx,Dgo=rx,Fu=rw,Fgo=r \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "node_modules/" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "var/" \
            --exclude "*.log" \
            -e "ssh" \
            ./ "$REMOTE:$REMOTE_DIR"

      # 12) Verify deploy
      - name: Verify version on server
        run: |
          ssh epgylzqu@87.98.230.129 "bash -lc '
            echo \"---- version.txt ----\"
            cat /home/epgylzqu/elliot.cat/public/version.txt || true

            echo \"---- dist folder ----\"
            ls -lh /home/epgylzqu/elliot.cat/public/dist/ || true
          '"
